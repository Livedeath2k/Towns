name: Build Towns Game

on:
  push:
    branches: [ "main" ] # Hier den Namen deines Haupt-Branches eintragen
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Erlaubt manuelles Starten über das Actions-Tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin' # "temurin" ist die verbreitetste OpenJDK-Distribution

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5' # Hier kannst du eine feste Version erzwingen

    - name: Build with Gradle
      run: gradle shadowJar
      # Nutzt den Gradle Wrapper. Falls dieser nicht im Repo ist, 'gradle build' nutzen.

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Towns-Game-JAR
        # Gradle legt die fertige Datei standardmäßig hier ab:
        path: build/libs/*.jar
