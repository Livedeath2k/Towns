name: Build Towns Game

on:
  push:
    branches: [ "main", "master" ] # Hier den Namen deines Haupt-Branches eintragen
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Erlaubt manuelles Starten über das Actions-Tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin' # "temurin" ist die verbreitetste OpenJDK-Distribution

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      # Diese Action konfiguriert Gradle und kümmert sich um das Caching von Abhängigkeiten

    - name: Build with Gradle
      run: ./gradlew build
      # Nutzt den Gradle Wrapper. Falls dieser nicht im Repo ist, 'gradle build' nutzen.

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Towns-Game-JAR
        # Gradle legt die fertige Datei standardmäßig hier ab:
        path: build/libs/*.jar
