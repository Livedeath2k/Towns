name: Create Windows EXE (Java 26)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      # Wir führen 'build' aus, um die JAR zu erzeugen
      run: gradle build

    - name: Prepare Deployment Folder
      # Wir sammeln alle JARs (deine App + Abhängigkeiten) in einem Ordner
      shell: bash
      run: |
        mkdir -p input_dir
        cp build/libs/*.jar input_dir/
        # Falls du Abhängigkeiten hast, müssten diese hier auch rein. 
        # Wenn du ein 'ShadowJar' oder 'FatJar' nutzt, reicht die obige Zeile.

    - name: Create EXE with jpackage
      shell: bash
      run: |
        # Wir ermitteln dynamisch den Namen deiner JAR-Datei
        MAIN_JAR=$(basename $(ls input_dir/*.jar | head -n 1))
        
        jpackage \
          --type exe \
          --dest output_dir/ \
          --name "TownsGame" \
          --input input_dir/ \
          --main-jar "$MAIN_JAR" \
          --main-class xaos.Towns \
          --win-dir-chooser \
          --win-shortcut \
          --win-menu \
          --vendor "Neighbours of TownsGame" \
          --description "Towns Game for Windows 11" \
          --verbose

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Towns-Windows-Installer
        path: output_dir/*.exe
